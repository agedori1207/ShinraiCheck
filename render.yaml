services:
  - type: web
    name: shinrai-check
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: SEARCH_RESULT_COUNT
        value: "12"
      - key: NODE_ENV
        value: production
