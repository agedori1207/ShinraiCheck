services:
  - type: web
    name: shinrai-check
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20.19.5"
      - key: SEARCH_RESULT_COUNT
        value: "12"
      - key: WIKIPEDIA_RESULT_COUNT
        value: "4"
      - key: GDELT_RESULT_COUNT
        value: "8"
      - key: NODE_ENV
        value: production
