name: ShinraiCheck
options:
  bundleIdPrefix: jp.example
  deploymentTarget:
    iOS: "17.0"
targets:
  ShinraiCheck:
    type: application
    platform: iOS
    sources:
      - ShinraiCheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.example.ShinraiCheck
        SWIFT_VERSION: 5.9
        INFOPLIST_KEY_CFBundleDisplayName: ShinraiCheck
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: false
